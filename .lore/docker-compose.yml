name: ${COMPOSE_PROJECT_NAME:-lore}
services:
  lore-runtime:
    image: lorehq/lore-docker:latest
    ports:
      - '${LORE_DOCS_PORT:-9184}:8000'
      - '${LORE_SEMANTIC_PORT:-9185}:8080'
    environment:
      - REDIS_URL=redis://lore-memory:6379
      - REPO_ROOT=/data/repo
      - DOCS_SOURCE=/data/repo/docs
      - SKILLS_SOURCE=/data/repo/.lore/skills
      - LORE_TOKEN=${LORE_TOKEN}
    volumes:
      - ..:/data/repo
      - runtime_data:/runtime-data
    depends_on:
      - lore-memory
    restart: unless-stopped

  lore-memory:
    image: redis/redis-stack-server:latest
    volumes:
      - ${LORE_REDIS_DATA:-${HOME}/.lore/redis-data}:/data
    restart: unless-stopped

volumes:
  runtime_data:
